name: Test / Build and Push Docker Image

on:
  push:
    tags:
      - '*'

jobs:
  test: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Convert JUnit XML to readable format
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: ./test-results.xml

      - name: Unit Test
        run: |
          docker build --target test -t redmine-client:test . --no-cache
          container_id=$(docker create redmine-client:test)
          docker cp $container_id:/app/test-results.xml ./test-results.xml
          docker rm $container_id

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results.xml

      - name: Log out from Docker Hub
        run: docker logout
      
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bun-redmine:${{ env.VERSION }}

      - name: Log out from Docker Hub
        run: docker logout